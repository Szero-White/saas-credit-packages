services:
  db:
    image: postgres:16-alpine
    container_name: saas_credits_db
    environment:
      TZ: Asia/Ho_Chi_Minh
      POSTGRES_DB: saas_credits
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d saas_credits"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: saas_credits_backend
    environment:
      TZ: Asia/Ho_Chi_Minh
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/saas_credits
      SECRET_KEY: change-this-secret-key
      ACCESS_TOKEN_EXPIRE_MINUTES: 1440
      FRONTEND_URL: http://localhost:5173
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    container_name: saas_credits_frontend
    environment:
      TZ: Asia/Ho_Chi_Minh
      VITE_API_BASE_URL: http://localhost:8000/api
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
